version: '3.8'

services:
  expendable_stoat:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: expendable_stoat
    restart: unless-stopped
    ports:
      - "5000:5000"      # Web Dashboard
      - "8080:8080"      # Phishing Server
      - "22:22"          # SSH (if enabled)
    volumes:
      - ./data:/app/.expendable_stoat
      - ./reports:/app/expendable_stoat_reports
      - ./deploy:/app/deploy
      - ./logs:/app/logs
      - /etc/localtime:/etc/localtime:ro
    environment:
      - TZ=UTC
      - EXPENDABLE_STOAT_ENV=production
      - PYTHONUNBUFFERED=1
    networks:
      - stoat_network
    cap_add:
      - NET_ADMIN
      - NET_RAW
      - SYS_ADMIN
      - SYS_PTRACE
    security_opt:
      - apparmor:unconfined
    sysctls:
      - net.ipv4.ping_group_range=0 2147483647
    depends_on:
      - redis
      - postgres

  redis:
    image: redis:7-alpine
    container_name: stoat_redis
    restart: unless-stopped
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    networks:
      - stoat_network

  postgres:
    image: postgres:15-alpine
    container_name: stoat_postgres
    restart: unless-stopped
    environment:
      - POSTGRES_DB=stoat
      - POSTGRES_USER=stoat
      - POSTGRES_PASSWORD=stoat_secure_password_2024
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks:
      - stoat_network

  pgadmin:
    image: dpage/pgadmin4:latest
    container_name: stoat_pgadmin
    restart: unless-stopped
    environment:
      - PGADMIN_DEFAULT_EMAIL=admin@stoat.com
      - PGADMIN_DEFAULT_PASSWORD=admin123
    ports:
      - "5050:80"
    volumes:
      - pgadmin_data:/var/lib/pgadmin
    networks:
      - stoat_network
    depends_on:
      - postgres

  nginx:
    image: nginx:alpine
    container_name: stoat_nginx
    restart: unless-stopped
    volumes:
      - ./nginx.conf:/etc/nginx/nginx.conf:ro
      - ./static:/usr/share/nginx/html/static
    ports:
      - "80:80"
      - "443:443"
    networks:
      - stoat_network
    depends_on:
      - expendable_stoat

volumes:
  redis_data:
  postgres_data:
  pgadmin_data:

networks:
  stoat_network:
    driver: bridge